kind = "web"
previewPath = "/"
title = "Robô de Vendas - Networking VIP"
version = "1.0.0"
id = "artifacts/robo-de-vendas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22259

[services.development]
run = "pnpm --filter @workspace/robo-de-vendas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/robo-de-vendas", "run", "build" ]
publicDir = "artifacts/robo-de-vendas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22259"
BASE_PATH = "/"
